services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend-sessions:/app/sessions
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - ORIGIN=http://localhost:3000
    depends_on:
      - backend

volumes:
  backend-sessions:
