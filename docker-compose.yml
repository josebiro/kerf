services:
  app:
    build:
      context: .
      args:
        PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL}
        PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    image: kerf
    env_file: ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - ORIGIN=http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - app-sessions:/app/backend/sessions
      - app-cache:/app/backend/cache

volumes:
  app-sessions:
  app-cache:
